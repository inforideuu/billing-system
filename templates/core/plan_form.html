{% extends 'base.html' %}

{% block title %}{{ title }} | Super Admin{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto animate-slide-up">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-6">
        <a href="{% url 'super_admin_plans' %}" class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-slate-200 transition-colors">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h1 class="text-2xl font-black text-slate-800">{{ title }}</h1>
            <p class="text-xs text-slate-500 mt-0.5">Define pricing details and configure permitted module locks.</p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="glass-card p-8 rounded-3xl border border-slate-100 shadow-xl relative overflow-hidden">
        <form method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <!-- Name -->
                <div>
                    <label for="name" class="block text-xs font-bold text-slate-500 uppercase mb-2">Plan Name</label>
                    <input type="text" id="name" name="name" value="{{ plan.name|default:'' }}" required
                        class="w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 text-sm font-semibold focus:outline-none focus:border-indigo-500 transition-colors"
                        placeholder="e.g. Premium Tier">
                </div>

                <!-- Max Cashiers -->
                <div>
                    <label for="max_cashiers" class="block text-xs font-bold text-slate-500 uppercase mb-2">Max Cashier Accounts</label>
                    <input type="number" id="max_cashiers" name="max_cashiers" value="{{ plan.max_cashiers|default:'5' }}" required
                        class="w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 text-sm font-semibold focus:outline-none focus:border-indigo-500 transition-colors"
                        placeholder="Use -1 for Unlimited">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 border-b border-slate-100 pb-6">
                <!-- Price 3 Months -->
                <div>
                    <label for="price_3_months" class="block text-xs font-bold text-slate-500 uppercase mb-2">Price for 3 Months (INR)</label>
                    <input type="number" step="0.01" id="price_3_months" name="price_3_months" value="{{ plan.price_3_months|default:'0.00' }}" required
                        class="w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 text-sm font-semibold focus:outline-none focus:border-indigo-500 transition-colors"
                        placeholder="e.g. 1200.00">
                </div>

                <!-- Price 6 Months -->
                <div>
                    <label for="price_6_months" class="block text-xs font-bold text-slate-500 uppercase mb-2">Price for 6 Months (INR)</label>
                    <input type="number" step="0.01" id="price_6_months" name="price_6_months" value="{{ plan.price_6_months|default:'0.00' }}" required
                        class="w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 text-sm font-semibold focus:outline-none focus:border-indigo-500 transition-colors"
                        placeholder="e.g. 2200.00">
                </div>

                <!-- Price 1 Year -->
                <div>
                    <label for="price_year" class="block text-xs font-bold text-slate-500 uppercase mb-2">Price for 1 Year (INR)</label>
                    <input type="number" step="0.01" id="price_year" name="price_year" value="{{ plan.price_year|default:'0.00' }}" required
                        class="w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 text-sm font-semibold focus:outline-none focus:border-indigo-500 transition-colors"
                        placeholder="e.g. 4000.00">
                </div>
            </div>

            <!-- Description -->
            <div class="mb-8">
                <label for="description" class="block text-xs font-bold text-slate-500 uppercase mb-2">Plan Description</label>
                <textarea id="description" name="description" rows="3"
                    class="w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 text-sm font-semibold focus:outline-none focus:border-indigo-500 transition-colors resize-none"
                    placeholder="Provide details about features included in this tier...">{{ plan.description|default:'' }}</textarea>
            </div>

            <!-- Feature Toggles Section -->
            <div class="border-t border-slate-100 pt-6 mb-8">
                <h3 class="text-sm font-bold text-slate-700 mb-4 uppercase tracking-wider">Features Configuration</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Festival Offers -->
                    <label class="flex items-center gap-3 p-4 bg-slate-50 hover:bg-slate-100/70 rounded-2xl border border-slate-150/50 cursor-pointer transition-all">
                        <input type="checkbox" name="has_festival_offers" class="w-5 h-5 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300"
                            {% if plan.has_festival_offers %}checked{% endif %}>
                        <div>
                            <span class="block text-sm font-bold text-slate-700">Festival Offers module</span>
                            <span class="block text-xs text-slate-500">Enable promotional/seasonal discounts.</span>
                        </div>
                    </label>

                    <!-- Batch Tracking -->
                    <label class="flex items-center gap-3 p-4 bg-slate-50 hover:bg-slate-100/70 rounded-2xl border border-slate-150/50 cursor-pointer transition-all">
                        <input type="checkbox" name="has_batch_tracking" class="w-5 h-5 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300"
                            {% if plan.has_batch_tracking %}checked{% endif %}>
                        <div>
                            <span class="block text-sm font-bold text-slate-700">Batch & Expiry Tracking</span>
                            <span class="block text-xs text-slate-500">Track inventories by batch numbers & expiry warnings.</span>
                        </div>
                    </label>

                    <!-- Advanced Reports -->
                    <label class="flex items-center gap-3 p-4 bg-slate-50 hover:bg-slate-100/70 rounded-2xl border border-slate-150/50 cursor-pointer transition-all">
                        <input type="checkbox" name="has_advanced_reports" class="w-5 h-5 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300"
                            {% if plan.has_advanced_reports %}checked{% endif %}>
                        <div>
                            <span class="block text-sm font-bold text-slate-700">Advanced Reports</span>
                            <span class="block text-xs text-slate-500">Unlocks financial vectors, taxes & profit summary.</span>
                        </div>
                    </label>

                    <!-- Smart Insights (AI) -->
                    <label class="flex items-center gap-3 p-4 bg-slate-50 hover:bg-slate-100/70 rounded-2xl border border-slate-150/50 cursor-pointer transition-all">
                        <input type="checkbox" name="has_smart_insights" class="w-5 h-5 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300"
                            {% if plan.has_smart_insights %}checked{% endif %}>
                        <div>
                            <span class="block text-sm font-bold text-slate-700">Smart Insights (AI)</span>
                            <span class="block text-xs text-slate-500">Unlock intelligent AI recommendation panel.</span>
                        </div>
                    </label>

                    <!-- Demand Forecasting -->
                    <label class="flex items-center gap-3 p-4 bg-slate-50 hover:bg-slate-100/70 rounded-2xl border border-slate-150/50 cursor-pointer transition-all">
                        <input type="checkbox" name="has_forecasting" class="w-5 h-5 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300"
                            {% if plan.has_forecasting %}checked{% endif %}>
                        <div>
                            <span class="block text-sm font-bold text-slate-700">Demand Forecasting</span>
                            <span class="block text-xs text-slate-500">AI predictions for products & inventories.</span>
                        </div>
                    </label>

                    <!-- Dynamic Pricing -->
                    <label class="flex items-center gap-3 p-4 bg-slate-50 hover:bg-slate-100/70 rounded-2xl border border-slate-150/50 cursor-pointer transition-all">
                        <input type="checkbox" name="has_dynamic_pricing" class="w-5 h-5 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300"
                            {% if plan.has_dynamic_pricing %}checked{% endif %}>
                        <div>
                            <span class="block text-sm font-bold text-slate-700">Dynamic pricing</span>
                            <span class="block text-xs text-slate-500">Automate retail pricing thresholds.</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3">
                <a href="{% url 'super_admin_plans' %}" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl text-sm transition-colors">
                    Cancel
                </a>
                <button type="submit" class="px-8 py-3 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-bold rounded-2xl text-sm shadow-md shadow-indigo-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
                    Save Subscription Plan
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
